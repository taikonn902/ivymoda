<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tài khoản | IVY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Scrollbar removal for modal and small custom tweaks */
        /* Custom input placeholder color */
        ::placeholder {
            color: #a0a0a0;
        }

        /* Icons inside inputs style */
        .input-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            transition: color 0.3s ease;
        }

        .input-icon:hover {
            color: #6b7280;
            /* Tailwindgray-500 */
        }

        /* subtle border on focused input */
        input:focus {
            outline: none;
            border-color: #fbbf24;
            /* amber-400 */
            box-shadow: 0 0 5px #fbbf24;
        }

        /* Separator lines for the footer divider text */
        .separator-line {
            height: 1px;
            background: #d1d5db;
            flex-grow: 1;
        }
        .floating-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .floating-input {
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            padding: 1.1rem 1rem 0.5rem 1rem;
            width: 100%;
            color: #111827;
            transition: border 0.2s;
        }
        .floating-label {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1rem;
            pointer-events: none;
            background: transparent;
            transition: all 0.2s;
        }
        .floating-input:focus + .floating-label,
        .floating-input:not(:placeholder-shown) + .floating-label {
            top: 0.2rem;
            left: 0.9rem;
            transform: none;
            font-size: 0.68rem;
            color: #6366f1;
            background: #fff;
            padding: 0 0.2rem;
        }
    </style>
</head>

<body class="bg-black bg-opacity-70 flex items-center justify-center min-h-screen font-sans">

    <!-- Modal container -->
    <div class="bg-white rounded-3xl w-full max-w-sm p-8 relative drop-shadow-xl">
        <!-- Close icon top right -->
        <button aria-label="Đóng Form" id="closeBtn"
            class="absolute top-5 right-5 text-gray-500 hover:text-gray-900 transition" type="button" title="Đóng">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <!-- Logo and Title -->
        <div class="flex flex-col items-center mb-6">
            <!-- Hoyoverse logo text styled -->
            <h1 class="inline-flex space-x-1 items-center font-bold text-2xl select-none">
                
                <span>IVY Shop</span>
            </h1>
            <p class="mt-3 font-semibold text-lg text-gray-900">Đăng Nhập Tài Khoản</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-5" autocomplete="off" novalidate>
            <!-- User/Email input -->
            <div class="floating-group">
                <input id="userEmail" type="text" placeholder=" " class="floating-input" required />
                <label for="userEmail" class="floating-label">Tên Người Dùng/Email</label>
                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5" title="Xóa nội dung"
                    aria-label="Xóa tên người dùng hoặc email" id="clearUserBtn" tabindex="-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="gray" viewBox="0 0 24 24" stroke="none"
                        stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Password input -->
            <div class="floating-group">
                <input id="password" type="password" placeholder=" " class="floating-input" required />
                <label for="password" class="floating-label">Mật Khẩu</label>
                <button type="button" class="absolute right-10 top-1/2 -translate-y-1/2 input-icon" id="clearPassBtn"
                    title="Xóa mật khẩu" aria-label="Xóa mật khẩu" tabindex="-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="gray" viewBox="0 0 24 24" stroke="none"
                        stroke-width="2" class="w-4 h-4">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 input-icon" id="togglePassBtn"
                    title="Hiện/Ẩn mật khẩu" aria-label="Hiện hoặc ẩn mật khẩu">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="gray" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" class="w-5 h-5" id="eyeIcon">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>

            <!-- Login button -->
            <button type="submit"
                class="w-full py-3 rounded-xl bg-gray-900 text-amber-300 font-semibold hover:bg-gray-800 transition">
                Đăng Nhập
            </button>
        </form>

        <!-- Bottom Links -->
        <div class="mt-4 flex justify-between text-sm text-amber-300 font-semibold select-none">
            <button type="button" class="hover:underline focus:underline">Ghi nhớ đăng nhập</button>
            <button type="button" class="hover:underline focus:underline">Đăng Ký Ngay</button>
        </div>

        <!-- Divider with text -->
        <div class="mt-5 flex items-center text-gray-500 text-xs font-medium select-none">
            <div class="separator-line"></div>
            <span class="mx-3 whitespace-nowrap">Đăng nhập bằng phương thức khác</span>
            <div class="separator-line"></div>
        </div>

        <!-- Social login icons -->
        <div class="mt-4 flex justify-center space-x-5">
            <!-- Google -->
            <button aria-label="Đăng nhập với Google" title="Google" type="button"
                class="rounded-full border border-gray-300 p-3 bg-white hover:bg-gray-100 transition flex items-center justify-center shadow-sm">
                <svg width="24" height="24" viewBox="0 0 48 48">
                    <g>
                        <path fill="#4285F4" d="M43.6 20.5h-1.9V20H24v8h11.3c-1.6 4.3-5.7 7-11.3 7-6.6 0-12-5.4-12-12s5.4-12 12-12c2.7 0 5.2.9 7.2 2.5l5.4-5.4C33.5 6.1 28.9 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.3-3.5z"/>
                        <path fill="#34A853" d="M6.3 14.7l6.6 4.8C14.5 16.1 18.9 13 24 13c2.7 0 5.2.9 7.2 2.5l5.4-5.4C33.5 6.1 28.9 4 24 4c-7.2 0-13.4 4.1-16.7 10.7z"/>
                        <path fill="#FBBC05" d="M24 44c5.4 0 10.1-1.8 13.5-4.9l-6.2-5.1c-2.1 1.4-4.8 2.2-7.3 2.2-5.6 0-10.3-3.8-12-9.1l-6.6 5.1C7.9 39.9 15.4 44 24 44z"/>
                        <path fill="#EA4335" d="M43.6 20.5h-1.9V20H24v8h11.3c-1.1 3-3.7 5.2-7.3 5.2-4.2 0-7.7-3.5-7.7-7.7 0-.6.1-1.2.2-1.7l-6.6-5.1C7.9 28.1 15.4 32 24 32c6.6 0 12-5.4 12-12 0-.8-.1-1.5-.2-2.2z"/>
                    </g>
                </svg>
            </button>
            <!-- Facebook -->
            <button aria-label="Đăng nhập với Facebook" title="Facebook" type="button"
                class="rounded-full border border-gray-300 p-3 bg-white hover:bg-blue-50 transition flex items-center justify-center shadow-sm">
                <svg width="24" height="24" viewBox="0 0 32 32">
                    <circle cx="16" cy="16" r="16" fill="#1877F3"/>
                    <path d="M21.5 16.1h-3v9h-3.7v-9h-2v-3.1h2v-2c0-2.1 1.2-3.2 3.3-3.2.7 0 1.5.1 2.1.2v2.4h-1.2c-.7 0-.9.3-.9.9v1.7h2.2l-.3 3.1z" fill="#fff"/>
                </svg>
            </button>
            <!-- Email -->
            <button aria-label="Đăng nhập với Email" title="Email" type="button"
                class="rounded-full border border-gray-300 p-3 bg-white hover:bg-gray-100 transition flex items-center justify-center shadow-sm">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <rect width="24" height="24" rx="12" fill="#F3F4F6"/>
                    <path d="M6 8.5C6 7.67 6.67 7 7.5 7h9c.83 0 1.5.67 1.5 1.5v7c0 .83-.67 1.5-1.5 1.5h-9A1.5 1.5 0 0 1 6 15.5v-7Zm1.5-.5a.5.5 0 0 0-.5.5v.2l6.5 4.33 6.5-4.33V8a.5.5 0 0 0-.5-.5h-12Zm12 1.7-6.5 4.33-6.5-4.33V15.5a.5.5 0 0 0 .5.5h12a.5.5 0 0 0 .5-.5V9.7Z" fill="#6366F1"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Toggle close modal button (if you want to do something - here just hide modal)
        const closeBtn = document.getElementById('closeBtn');
        closeBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Clear user/email input
        const clearUserBtn = document.getElementById('clearUserBtn');
        const userEmailInput = document.getElementById('userEmail');
        clearUserBtn.addEventListener('click', () => {
            userEmailInput.value = '';
            userEmailInput.focus();
        });

        // Clear password input
        const clearPassBtn = document.getElementById('clearPassBtn');
        const passwordInput = document.getElementById('password');
        clearPassBtn.addEventListener('click', () => {
            passwordInput.value = '';
            passwordInput.focus();
        });

        // Toggle password visibility
        const togglePassBtn = document.getElementById('togglePassBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        togglePassBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-5.523 0-10-4.477-10-10a9.963 9.963 0 014.89-8.432M15 9a3 3 0 11-6 0 3 3 0 016 0z" />';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" />';
            }
        });

        // Prevent form submission for demonstration
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert("Đăng nhập thành công (chỉ demo).");
        });
    </script>

</body>

</html>
