<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="shortcut icon" href="images/logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/icon.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/footer.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <title>Đăng nhập | IVY Shop</title>
</head>

<body class="bg-white">
    <main class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-white p-4">

        <div
            class="w-full max-w-6xl grid md:grid-cols-2 rounded-[32px] overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.1)]">

            <!-- LEFT: LOGIN -->
            <div class="bg-white/80 backdrop-blur-xl p-8 md:p-12">

                <!-- header -->
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-3xl font-semibold">Đăng nhập</h2>
                    <button onclick="history.back()" class="w-10 h-10 rounded-full border border-gray-300
           flex items-center justify-center
           text-gray-600
           hover:bg-black hover:text-white
           active:scale-90
           transition-all duration-200">

                        <span class="material-symbols-outlined text-[20px] text-inherit">
                            close
                        </span>
                    </button>
                </div>

                <p class="text-sm text-gray-500 mb-8">
                    Đăng nhập để theo dõi đơn hàng và nhận ưu đãi cá nhân hóa.
                </p>

                <!-- FORM -->
                <form class="space-y-5">

                    <!-- USER (floating label giữ nguyên style bạn) -->
                    <div class="relative">
                        <input type="text" required placeholder=" " class="peer w-full px-4 py-3 rounded-xl border border-gray-300 bg-white/80
                        focus:outline-none focus:border-black focus:ring-2 focus:ring-gray-200 transition">

                        <label class="absolute left-3 top-0 -translate-y-1/2 px-2 bg-white text-gray-400 text-sm
                        transition-all duration-200 cursor-text
                        peer-placeholder-shown:top-1/2
                        peer-placeholder-shown:text-base
                        peer-placeholder-shown:text-gray-400
                        peer-placeholder-shown:-translate-y-1/2
                        peer-focus:top-0
                        peer-focus:-translate-y-1/2
                        peer-focus:text-xs
                        peer-focus:text-black">
                            Tên người dùng
                        </label>
                    </div>

                    <!-- PASSWORD -->
                    <div class="relative">
                        <input type="password" required placeholder=" " class="peer w-full px-4 py-3 pr-20 rounded-xl border border-gray-300 bg-white/80
                        focus:outline-none focus:border-black focus:ring-2 focus:ring-gray-200 transition">

                        <label class="absolute left-3 top-0 -translate-y-1/2 px-2 bg-white text-gray-400 text-sm
                        transition-all duration-200 cursor-text
                        peer-placeholder-shown:top-1/2
                        peer-placeholder-shown:text-base
                        peer-placeholder-shown:text-gray-400
                        peer-placeholder-shown:-translate-y-1/2
                        peer-focus:top-0
                        peer-focus:-translate-y-1/2
                        peer-focus:text-xs
                        peer-focus:text-black">
                            Mật khẩu
                        </label>

                        <button type="button" id="toggle-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-black flex items-center">

                            <span id="eye-icon" class="material-symbols-outlined text-[20px] leading-none">
                                visibility
                            </span>
                        </button>
                    </div>

                    <!-- OPTIONS -->
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="accent-black w-4 h-4">
                            <span>Ghi nhớ</span>
                        </label>
                        <a href="#" class="hover:text-[#AC2F33]">Quên mật khẩu?</a>
                    </div>

                    <!-- BUTTON -->
                    <button type="submit" class="w-full py-3.5 bg-black text-white rounded-xl
                    hover:bg-gray-900 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-black/20">
                        Đăng nhập
                    </button>

                </form>

                <!-- divider -->
                <div class="mt-8 mb-6 flex items-center gap-3 text-sm text-gray-400">
                    <span class="h-px bg-gray-200 flex-1"></span>
                    <span>Hoặc</span>
                    <span class="h-px bg-gray-200 flex-1"></span>
                </div>

                <!-- SOCIAL -->
                <div class="grid grid-cols-2 gap-3">
                    <button class="h-12 border border-gray-300 rounded-xl hover:bg-gray-50 transition">
                        Google
                    </button>
                    <button class="h-12 border border-gray-300 rounded-xl hover:bg-gray-50 transition">
                        Facebook
                    </button>
                </div>

                <!-- register -->
                <p class="text-sm text-center mt-7">
                    Bạn chưa có tài khoản?
                    <a href="register.html" class="font-semibold hover:text-[#AC2F33]">Đăng ký</a>
                </p>

            </div>

            <!-- RIGHT: IMAGE -->
            <div class="hidden md:block relative">

                <img src="images/login.png" class="w-full h-full object-cover" />

                <!-- overlay -->
                <div class="absolute inset-0 bg-black/40"></div>

                <!-- content -->
                <div class="absolute bottom-10 left-10 text-white max-w-sm">

                    <p class="text-sm text-white/80">
                        Khám phá bộ sưu tập mới và nhận ưu đãi dành riêng cho bạn.
                    </p>
                </div>

            </div>

        </div>

    </main>


    <script>
        const passwordInput = document.querySelector('input[type="password"]');
        const toggleBtn = document.getElementById('toggle-password');
        const icon = document.getElementById('eye-icon');

        toggleBtn.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';

            passwordInput.type = isHidden ? 'text' : 'password';

            // đổi icon
            icon.textContent = isHidden ? 'visibility_off' : 'visibility';
        });
    </script>
</body>

</html>
