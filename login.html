<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="shortcut icon" href="images/logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/icon.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/footer.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <title>Đăng nhập | IVY Shop</title>
</head>

<body class="bg-white">
    <header id="header-page"
        class="py-[1.5%] px-[3%] flex justify-between items-center text-black fixed top-0 left-0 w-full z-50 bg-white transition-transform duration-300">
        <nav id="nav-left" class="flex gap-4 pl-5 text-black uppercase font-semibold text-[13px]">
            <a href="#">Nam</a>
            <a href="#">Nữ</a>
            <a href="#">Trẻ em</a>
            <a href="#" class="text-[#FF0000] hover:text-[#FF0000]">Siêu Sale</a>
            <a href="#">Bộ sưu tập</a>
            <a href="#">Về chúng tôi</a>
        </nav>
        <a href="index.html" class="logo absolute left-1/2 -translate-x-1/2 mt-2">
            <img src="images/logo.png" alt="logo" class="w-[9rem]">
        </a>
        <nav id="nav-right" class="flex gap-5 pr-5">
            <a href="#"><span class="material-symbols-outlined thin">favorite</span></a>
            <a href="login.html"><span class="material-symbols-outlined thin">person</span></a>
            <a href="#"><span class="material-symbols-outlined thin">shopping_basket</span></a>
        </nav>
    </header>

    <main class="pt-[130px] pb-20 min-h-screen">
        <section class="w-[92%] max-w-xl mx-auto relative">
            <div class="absolute -top-16 -left-14 w-44 h-44 bg-gray-100 rounded-full blur-3xl opacity-80"></div>
            <div class="absolute -bottom-16 -right-14 w-52 h-52 bg-gray-100 rounded-full blur-3xl opacity-70"></div>
            <div
                class="relative border border-gray-200 rounded-[32px] p-8 md:p-10 shadow-[0_14px_40px_rgba(0,0,0,0.08)] bg-gradient-to-b from-white to-gray-50/80 backdrop-blur-xl">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-3xl font-semibold">Đăng nhập</h2>
                    <a href="index.html"
                        class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center hover:bg-black hover:text-white">
                        <span class="material-symbols-outlined text-[20px]">close</span>
                    </a>
                </div>
                <p class="text-sm text-gray-500 mb-8">Đăng nhập để theo dõi đơn hàng và nhận ưu đãi cá nhân hóa.</p>

                <form id="login-form" class="space-y-5" novalidate>
                    <div class="relative group">
                        <input id="user-email" type="text" required placeholder="" autocomplete="off"
                            class="peer w-full px-4 py-3 rounded-xl border border-gray-300 bg-white/70 backdrop-blur-md focus:outline-none focus:border-black focus:ring-2 focus:ring-gray-200 transition">
                        <label for="user-email"
                            class="absolute left-3 top-0 -translate-y-1/2 px-2 bg-white text-gray-400 text-sm transition-all duration-200 cursor-text peer-placeholder-shown:top-1/2 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:-translate-y-1/2 peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-black">
                            Tên người dùng
                        </label>
                    </div>

                    <div class="relative group">
                        <input id="password" type="password" required placeholder=""
                            class="peer w-full px-4 py-3 pr-20 rounded-xl border border-gray-300 bg-white/70 backdrop-blur-md focus:outline-none focus:border-black focus:ring-2 focus:ring-gray-200 transition">
                        <label for="password"
                            class="absolute left-3 top-0 -translate-y-1/2 px-2 bg-white text-gray-400 text-sm transition-all duration-200 cursor-text peer-placeholder-shown:top-1/2 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:-translate-y-1/2 peer-focus:top-0 peer-focus:-translate-y-1/2 peer-focus:text-xs peer-focus:text-black">
                            Mật khẩu
                        </label>
                        <button type="button" id="toggle-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-gray-500 hover:text-black">
                            Hiện
                        </button>
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="accent-black w-4 h-4">
                            <span>Ghi nhớ đăng nhập</span>
                        </label>
                        <a href="#" class="hover:text-[#AC2F33]">Quên mật khẩu?</a>
                    </div>

                    <button type="submit"
                        class="w-full py-3.5 bg-black text-white border border-black rounded-tl-[16px] rounded-br-[16px] hover:bg-white hover:text-black">
                        Đăng nhập
                    </button>
                </form>

                <div class="mt-7 mb-6 flex items-center gap-3 text-sm text-gray-400">
                    <span class="h-px bg-gray-200 flex-1"></span>
                    <span>Hoặc đăng nhập với</span>
                    <span class="h-px bg-gray-200 flex-1"></span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button type="button"
                        class="h-12 border border-gray-300 rounded-xl flex items-center justify-center bg-white hover:bg-gray-50 hover:border-gray-400">
                        <svg width="22" height="22" viewBox="0 0 48 48" aria-hidden="true">
                            <path fill="#FFC107"
                                d="M43.6 20.5H42V20H24v8h11.3C33.8 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.4 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 19.8-8 19.8-20c0-1.2-.1-2.3-.2-3.5z">
                            </path>
                            <path fill="#FF3D00"
                                d="M6.3 14.7l6.6 4.8C14.7 15.4 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.4 6.1 29.5 4 24 4 16.3 4 9.6 8.3 6.3 14.7z">
                            </path>
                            <path fill="#4CAF50"
                                d="M24 44c5.2 0 10-2 13.5-5.3l-6.2-5.1C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.2-8l-6.6 5.1C9.4 39.7 16.1 44 24 44z">
                            </path>
                            <path fill="#1976D2"
                                d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.2 5.1C40.8 35.5 44 30.3 44 24c0-1.2-.1-2.3-.4-3.5z">
                            </path>
                        </svg>
                    </button>
                    <button type="button"
                        class="h-12 border border-gray-300 rounded-xl flex items-center justify-center bg-white hover:bg-gray-50 hover:border-gray-400">
                        <svg width="22" height="22" viewBox="0 0 32 32" aria-hidden="true">
                            <circle cx="16" cy="16" r="16" fill="#1877F2"></circle>
                            <path d="M18.2 26v-9h2.8l.4-3.2h-3.2v-2c0-.9.3-1.5 1.6-1.5h1.7V7.5c-.3 0-1.3-.1-2.5-.1-2.5 0-4.1 1.5-4.1 4.2v2.2h-2.8V17h2.8v9h3.4z"
                                fill="#fff"></path>
                        </svg>
                    </button>
                  
                </div>

                <p class="text-sm text-center mt-7">
                    Bạn chưa có tài khoản?
                    <a href="#" class="font-semibold hover:text-[#AC2F33]">Đăng ký ngay</a>
                </p>
            </div>
        </section>
    </main>

    <script src="js/header-hide.js"></script>
    <script>
        const togglePasswordBtn = document.getElementById("toggle-password");
        const passwordInput = document.getElementById("password");
        const loginForm = document.getElementById("login-form");

        togglePasswordBtn.addEventListener("click", () => {
            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";
            togglePasswordBtn.textContent = isPassword ? "Ẩn" : "Hiện";
        });

        loginForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const userEmail = document.getElementById("user-email").value.trim();
            const password = passwordInput.value.trim();

            if (!userEmail || !password) {
                Swal.fire({
                    icon: "error",
                    title: "Thiếu thông tin",
                    text: "Vui lòng nhập đầy đủ tài khoản và mật khẩu."
                });
                return;
            }

            Swal.fire({
                icon: "success",
                title: "Đăng nhập thành công",
                text: "Chào mừng bạn quay lại IVY Shop.",
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "index.html";
            });
        });
    </script>
</body>

</html>
