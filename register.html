<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="shortcut icon" href="images/logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/icon.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/footer.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <title>Đăng Ký | IVY Shop</title>
</head>

<body class="bg-white">
    <main class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-white p-4">

    <div class="w-full max-w-6xl grid md:grid-cols-2 rounded-[32px] overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.1)]">

        <!-- LEFT: REGISTER -->
        <div class="bg-white/80 backdrop-blur-xl p-8 md:p-12">

            <!-- header -->
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-3xl font-semibold">Đăng ký</h2>

                <button onclick="history.back()"
                    class="group w-10 h-10 rounded-full border border-gray-300
                           flex items-center justify-center
                           text-gray-600 hover:bg-black transition">

                    <span class="material-symbols-outlined text-[20px] group-hover:text-white transition">
                        close
                    </span>
                </button>
            </div>

            <p class="text-sm text-gray-500 mb-8">
                Tạo tài khoản để mua sắm nhanh hơn và nhận ưu đãi riêng.
            </p>

            <!-- FORM -->
            <form class="space-y-5">

                <!-- NAME -->
                <div class="relative">
                    <input type="text" required placeholder=" "
                        class="peer w-full px-4 py-3 rounded-xl border border-gray-300 bg-white/80
                        focus:outline-none focus:border-black focus:ring-2 focus:ring-gray-200 transition">

                    <label
                        class="absolute left-3 top-0 -translate-y-1/2 px-2 bg-white text-gray-400 text-sm
                        transition-all duration-200
                        peer-placeholder-shown:top-1/2
                        peer-placeholder-shown:text-base
                        peer-placeholder-shown:-translate-y-1/2
                        peer-focus:top-0
                        peer-focus:text-xs
                        peer-focus:text-black">
                        Họ và tên
                    </label>
                </div>

                <!-- EMAIL -->
                <div class="relative">
                    <input type="email" required placeholder=" "
                        class="peer w-full px-4 py-3 rounded-xl border border-gray-300 bg-white/80
                        focus:outline-none focus:border-black focus:ring-2 focus:ring-gray-200 transition">

                    <label
                        class="absolute left-3 top-0 -translate-y-1/2 px-2 bg-white text-gray-400 text-sm
                        transition-all duration-200
                        peer-placeholder-shown:top-1/2
                        peer-placeholder-shown:text-base
                        peer-placeholder-shown:-translate-y-1/2
                        peer-focus:top-0
                        peer-focus:text-xs
                        peer-focus:text-black">
                        Email
                    </label>
                </div>

                <!-- PASSWORD -->
                <div class="relative">
                    <input id="password" type="password" required placeholder=" "
                        class="peer w-full px-4 py-3 pr-20 rounded-xl border border-gray-300 bg-white/80
                        focus:outline-none focus:border-black focus:ring-2 focus:ring-gray-200 transition">

                    <label
                        class="absolute left-3 top-0 -translate-y-1/2 px-2 bg-white text-gray-400 text-sm
                        transition-all duration-200
                        peer-placeholder-shown:top-1/2
                        peer-placeholder-shown:text-base
                        peer-placeholder-shown:-translate-y-1/2
                        peer-focus:top-0
                        peer-focus:text-xs
                        peer-focus:text-black">
                        Mật khẩu
                    </label>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="relative">
                    <input id="confirm-password" type="password" required placeholder=" "
                        class="peer w-full px-4 py-3 rounded-xl border border-gray-300 bg-white/80
                        focus:outline-none focus:border-black focus:ring-2 focus:ring-gray-200 transition">

                    <label
                        class="absolute left-3 top-0 -translate-y-1/2 px-2 bg-white text-gray-400 text-sm
                        transition-all duration-200
                        peer-placeholder-shown:top-1/2
                        peer-placeholder-shown:text-base
                        peer-placeholder-shown:-translate-y-1/2
                        peer-focus:top-0
                        peer-focus:text-xs
                        peer-focus:text-black">
                        Nhập lại mật khẩu
                    </label>
                </div>

                <!-- TERMS -->
                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox" class="accent-black">
                    <span>Tôi đồng ý với điều khoản</span>
                </label>

                <!-- BUTTON -->
                <button type="submit"
                    class="w-full py-3.5 bg-black text-white rounded-xl
                    hover:bg-gray-900 active:scale-[0.98] transition shadow-lg shadow-black/20">
                    Tạo tài khoản
                </button>

            </form>

            <!-- LOGIN LINK -->
            <p class="text-sm text-center mt-7">
                Đã có tài khoản?
                <a href="login.html" class="font-semibold hover:text-[#AC2F33]">Đăng nhập</a>
            </p>

        </div>

        <!-- RIGHT: IMAGE -->
        <div class="hidden md:block relative">

            <img src="images/banner2.png"
                class="w-full h-full object-cover" />

            <div class="absolute inset-0 bg-black/40"></div>

            <div class="absolute bottom-10 left-10 text-white max-w-sm">
                <h3 class="text-2xl font-semibold mb-3">
                    Tham gia cùng chúng tôi
                </h3>
                <p class="text-sm text-white/80">
                    Tạo tài khoản để trải nghiệm mua sắm nhanh chóng và tiện lợi hơn.
                </p>
            </div>

        </div>

    </div>

</main>


    <script>
        const passwordInput = document.querySelector('input[type="password"]');
        const toggleBtn = document.getElementById('toggle-password');
        const icon = document.getElementById('eye-icon');

        toggleBtn.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';

            passwordInput.type = isHidden ? 'text' : 'password';

            // đổi icon
            icon.textContent = isHidden ? 'visibility_off' : 'visibility';
        });
    </script>
</body>

</html>
